<!DOCTYPE html>
<html>
<head>
    <title>NTSC Simple Test</title>
</head>
<body>
    <h1>NTSC Simple Test</h1>
    <canvas id="canvas" width="560" height="192" style="border: 1px solid black; image-rendering: pixelated; width: 560px;"></canvas>
    <div id="output"></div>

    <script type="module">
        import StdHiRes from './src/lib/std-hi-res.js';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');

        // Create HGR image (already initialized with zeros)
        const hgr = new StdHiRes();

        // Draw a solid purple rectangle (pattern 1: 0x2a/0x55)
        // Pattern 1 from getSolidPatterns() alternates 0x2a and 0x55
        const pattern = StdHiRes.getSolidPatterns()[1];  // purple
        console.log('Purple pattern bytes:', Array.from(pattern.slice(0, 8)).map(b => `0x${b.toString(16)}`));

        // Fill a 10x10 rectangle at position (5, 5) with purple pattern
        for (let y = 50; y < 60; y++) {
            const rowOffset = StdHiRes.rowToOffset(y);
            for (let x = 5; x < 15; x++) {
                const byteIndex = rowOffset + x;
                hgr.rawBytes[byteIndex] = pattern[(y - 50) % pattern.length];
            }
        }

        // Render in NTSC mode
        const imageData = ctx.createImageData(560, 192);
        hgr.renderFull(imageData, 'ntsc');

        // Display
        ctx.putImageData(imageData, 0, 0);

        // Sample pixels from the purple rectangle
        const sampleData = ctx.getImageData(10 * 2, 55, 10, 1);  // Sample from middle of rect (x=10*2 for DHGR)
        const sample = sampleData.data;
        const avgR = (sample[0] + sample[4] + sample[8]) / 3;
        const avgG = (sample[1] + sample[5] + sample[9]) / 3;
        const avgB = (sample[2] + sample[6] + sample[10]) / 3;

        output.innerHTML = `<p>Sample pixel RGB: (${avgR.toFixed(0)}, ${avgG.toFixed(0)}, ${avgB.toFixed(0)})</p>`;
        output.innerHTML += `<p>Expected: Non-black color (purple/magenta tones)</p>`;

        if (avgR < 10 && avgG < 10 && avgB < 10) {
            output.innerHTML += `<p style="color: red;"><strong>FAIL: Pixels are black!</strong></p>`;
        } else {
            output.innerHTML += `<p style="color: green;"><strong>PASS: Pixels have color!</strong></p>`;
        }
    </script>
</body>
</html>
