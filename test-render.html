<!DOCTYPE html>
<html>
<head>
  <title>NTSC Renderer Test</title>
</head>
<body>
  <h1>NTSC Renderer Test</h1>
  <canvas id="canvas" width="560" height="192"></canvas>
  <script type="module">
    import NTSCRenderer from './docs/src/lib/ntsc-renderer.js';

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(560, 192);

    // Create HGR screen data - fill with different patterns
    const rawBytes = new Uint8Array(8192);

    // Row 0-20: Purple (0x2A)
    for (let y = 0; y < 20; y++) {
      const offset = y * 40;
      for (let x = 0; x < 40; x++) {
        rawBytes[offset + x] = 0x2A;
      }
    }

    // Row 20-40: Green (0x55)
    for (let y = 20; y < 40; y++) {
      const offset = y * 40;
      for (let x = 0; x < 40; x++) {
        rawBytes[offset + x] = 0x55;
      }
    }

    // Row 40-60: Blue (0xAA)
    for (let y = 40; y < 60; y++) {
      const offset = y * 40;
      for (let x = 0; x < 40; x++) {
        rawBytes[offset + x] = 0xAA;
      }
    }

    // Row 60-80: Orange (0xD5)
    for (let y = 60; y < 80; y++) {
      const offset = y * 40;
      for (let x = 0; x < 40; x++) {
        rawBytes[offset + x] = 0xD5;
      }
    }

    // Render
    const renderer = new NTSCRenderer();
    for (let y = 0; y < 192; y++) {
      const offset = y * 40;
      renderer.renderHgrScanline(imageData, rawBytes, y, offset);
    }

    ctx.putImageData(imageData, 0, 0);

    console.log('Rendered OK');
  </script>
</body>
</html>
